<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧會議紀錄系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; background-color: #f4f7f6; color: #333; line-height: 1.6; padding: 20px; max-width: 900px; margin: auto; }
        h1, h2 { color: #2c3e50; text-align: center; }
        .container { background: #fff; padding: 20px 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="password"], input[type="datetime-local"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
        textarea { resize: vertical; height: 120px; }
        
        /* 按鈕基本樣式 */
        button { font-family: inherit; }
        .btn-primary { background-color: #3498db; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-size: 16px; width: 100%; transition: background 0.3s; margin-top: 10px;}
        .btn-primary:hover { background-color: #2980b9; }
        .btn-clear { background-color: #95a5a6; }
        .btn-clear:hover { background-color: #7f8c8d; }
        
        /* 匯出與錄音按鈕樣式 */
        .btn-action { background-color: #2ecc71; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-size: 14px; margin-right: 5px; margin-bottom: 5px; display: inline-block; text-decoration: none; text-align: center;}
        .btn-action:hover { background-color: #27ae60; }
        .btn-action.danger { background-color: #e74c3c; }
        .btn-action.danger:hover { background-color: #c0392b; }
        .btn-action.delete { background-color: #7f8c8d; }
        .btn-action:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        
        /* 錄音區塊特別樣式 */
        .recording-box { background-color: #fdf2e9; border: 1px solid #e67e22; padding: 15px; border-radius: 4px; margin-bottom: 15px; }
        .recording-box audio { width: 100%; margin-top: 10px; outline: none; }
        .recording-box .status { color: #d35400; font-weight: bold; margin-left: 10px; font-size: 0.9em; }
        #interimText { color: #888; font-style: italic; margin-top: 5px; font-size: 0.9em; display: block; }
        .meter { height: 10px; background: #eee; border-radius: 999px; overflow: hidden; margin-top: 10px; border: 1px solid #e0e0e0; }
        .meter > div { height: 100%; width: 0%; background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c); transition: width 0.08s linear; }
        .hint { font-size: 12px; color: #6b6b6b; margin-top: 6px; line-height: 1.4; }
        .inline-row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-top: 8px; }

        /* 紀錄卡片 */
        .record-card { background: #eaf2f8; border-left: 5px solid #3498db; padding: 15px; margin-bottom: 15px; border-radius: 4px; }
        .record-card h3 { margin-top: 0; color: #2980b9; }
        .translation-box { background-color: #fff; border-left: 3px solid #f39c12; padding: 10px; margin-top: 10px; font-size: 0.9em; color: #555; }
        .export-actions { margin-top: 15px; text-align: right; }
    </style>
</head>
<body>

    <h1>📝 智慧會議紀錄系統</h1>

    <div class="container">
        <form id="meetingForm">
            <div class="recording-box">
                <label>🎙️ 現場會議即時錄音與語音轉文字</label>
                <div>
                    <button type="button" id="btnStartRecord" class="btn-action" onclick="startRecording()">🎤 開始錄音</button>
                    <button type="button" id="btnStopRecord" class="btn-action danger" onclick="stopRecording()" disabled>⏹️ 停止錄音</button>
                    <span id="recordingStatus" class="status"></span>
                </div>
                <div class="inline-row">
                    <label style="font-weight:normal;">
                        <input type="checkbox" id="speakerMode">
                        外放收音模式（更容易收手機外放）
                    </label>
                    <label style="font-weight:normal;">
                        <input type="checkbox" id="textOnlyMode" onchange="updateRecordModeUI()">
                        純文字聽寫（不錄音、不下載錄音檔）
                    </label>
                    <span id="micSource" class="hint"></span>
                </div>
                <span id="interimText"></span>
                <div class="meter" aria-label="麥克風音量">
                    <div id="micMeterFill"></div>
                </div>
                <div class="hint">
                    勾選「外放收音模式」會關閉回音消除/降噪/自動增益，通常更能收進手機外放聲音，但也可能帶來更多回音與背景音。
                    建議：手機改外放、靠近麥克風 10–30 公分、關閉風扇/空調噪音。
                </div>
                <audio id="audioPlayback" controls style="display:none;"></audio>
                <button type="button" id="btnDownloadAudio" class="btn-action" style="display:none; margin-top: 10px; background-color: #8e44ad;" onclick="downloadOrShareLastAudio()">⬇️ 下載 / 分享錄音檔</button>
            </div>

            <div class="form-group">
                <label for="meetingDate">1. 時間與日期</label>
                <input type="datetime-local" id="meetingDate" required>
            </div>
            <div class="form-group">
                <label for="participants">2. 參與人員</label>
                <input type="text" id="participants" placeholder="例如：王小明, 李大華" required>
            </div>
            <div class="form-group">
                <label for="chatLog">（選用）從對話紀錄自動帶入參與人員</label>
                <textarea id="chatLog" placeholder="貼上對話紀錄，例如：&#10;王小明：今天的議題是...&#10;李大華：我補充一下...&#10;（系統會抓取每行冒號前的名字，或 @人名）" style="height: 110px;"></textarea>
                <button type="button" class="btn-action" onclick="fillParticipantsFromChat()">👥 從對話紀錄擷取參與人員</button>
            </div>
            <div class="form-group">
                <label for="actionItems">3. 行動方案 (將自動翻譯為英文)</label>
                <textarea id="actionItems" placeholder="請輸入會議決議的行動方案..." required></textarea>
            </div>
            <div class="form-group">
                <label for="meetingContent">4. 會議內容 (錄音時會自動將語音轉文字填入此處)</label>
                <textarea id="meetingContent" placeholder="請輸入詳細會議內容..." required></textarea>
            </div>
            <div class="form-group">
                <button type="button" class="btn-action" onclick="generateActionItemsFromContent()">🧩 從會議內容整理行動方案（規則抽取）</button>
                <button type="button" class="btn-action" onclick="generateActionItemsWithAI()">🤖 用 AI 從逐字稿整理行動方案</button>
                <details style="margin-top: 10px;">
                    <summary style="cursor:pointer; font-weight:bold; color:#2c3e50;">（選用）AI API 設定（使用者自帶 Key，可選多家供應商）</summary>
                    <div style="margin-top:10px;">
                        <div class="form-group">
                            <label for="aiProvider">供應商 / 平台</label>
                            <select id="aiProvider" onchange="onProviderChange()">
                                <option value="openai">OpenAI / 相容 API</option>
                                <option value="gemini">Google Gemini</option>
                                <option value="other">自訂（其他相容服務）</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="aiEndpoint">API Endpoint（OpenAI 相容）</label>
                            <input type="text" id="aiEndpoint" value="https://api.openai.com/v1/chat/completions">
                        </div>
                        <div class="form-group">
                            <label for="aiModel">Model</label>
                            <select id="aiModelSelect" onchange="onModelPresetChange()">
                                <option value="gpt-4o-mini" selected>gpt-4o-mini（OpenAI）</option>
                                <option value="gpt-4.1-mini">gpt-4.1-mini（OpenAI）</option>
                                <option value="gpt-4o">gpt-4o（OpenAI）</option>
                                <option value="gemini-1.5-flash">gemini-1.5-flash（Gemini）</option>
                                <option value="gemini-1.5-pro">gemini-1.5-pro（Gemini）</option>
                                <option value="_custom">自訂模型名稱…</option>
                            </select>
                            <input type="text" id="aiModel" value="gpt-4o-mini" style="margin-top:6px;" placeholder="也可以直接輸入模型名稱">
                        </div>
                        <div class="form-group">
                            <label for="aiKey">API Key（不寫入 localStorage；可選擇只暫存本次分頁）</label>
                            <input type="password" id="aiKey" placeholder="貼上你的 API Key" autocomplete="off" spellcheck="false" inputmode="text">
                            <div style="margin-top:8px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                                <label style="font-weight:normal;">
                                    <input type="checkbox" id="rememberKey" onchange="toggleRememberKey()"> 記住（僅本次分頁）
                                </label>
                                <button type="button" class="btn-action delete" onclick="toggleShowKey()" style="margin:0;">👁️ 顯示/隱藏</button>
                                <button type="button" class="btn-action delete" onclick="clearByokKey()" style="margin:0;">🧹 清除 Key</button>
                                <span style="font-size:12px; opacity:0.85;">提醒：前端直連可能遇到 CORS；要真正保護 Key 仍需代理服務。</span>
                            </div>
                        </div>
                    </div>
                </details>
            </div>
            
            <button type="button" class="btn-primary" onclick="saveRecord()">💾 儲存並翻譯會議紀錄</button>
            <button type="button" class="btn-primary btn-clear" onclick="clearAllRecords()">⚠️ 清空所有歷史紀錄</button>
        </form>
    </div>

    <h2>📂 歷史會議紀錄</h2>
    <div id="recordsContainer"></div>

    <script>
        // --- 錄音與語音辨識相關變數 ---
        let mediaRecorder;
        let audioChunks = [];
        let recognition;
        let transientAiKey = "";
        const KEY_STORAGE = 'meeting_byok_api_key_session';
        let activeStream;
        let audioCtx;
        let analyser;
        let meterRaf;
        let isTextOnlyRunning = false;
        let lastAudioBlob;
        let lastAudioUrl;
        let lastAudioFilename = "";
        let lastAudioMimeType = "";
        
        function getLocalDatetimeInputValue(d = new Date()) {
            const pad = (n) => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        function setMeetingDateNow() {
            document.getElementById('meetingDate').value = getLocalDatetimeInputValue();
        }

        setMeetingDateNow();

        function isTextOnlySelected() {
            return !!document.getElementById('textOnlyMode')?.checked;
        }

        function updateRecordModeUI() {
            const textOnly = isTextOnlySelected();
            const startBtn = document.getElementById('btnStartRecord');
            const speakerEl = document.getElementById('speakerMode');

            if (speakerEl) {
                speakerEl.disabled = textOnly;
                if (textOnly) speakerEl.checked = false;
            }

            if (startBtn && !startBtn.disabled) {
                startBtn.innerText = textOnly ? "🎤 開始聽寫" : "🎤 開始錄音";
            }
        }

        updateRecordModeUI();

        function initByokKey() {
            const saved = sessionStorage.getItem(KEY_STORAGE);
            if (saved) transientAiKey = saved;

            const keyEl = document.getElementById('aiKey');
            const rememberEl = document.getElementById('rememberKey');
            if (keyEl && saved) keyEl.value = saved;
            if (rememberEl && saved) rememberEl.checked = true;
        }

        function syncKeyToSessionIfNeeded() {
            const rememberEl = document.getElementById('rememberKey');
            if (!rememberEl) return;
            if (rememberEl.checked && transientAiKey) {
                sessionStorage.setItem(KEY_STORAGE, transientAiKey);
            } else {
                sessionStorage.removeItem(KEY_STORAGE);
            }
        }

        function toggleRememberKey() {
            const keyInput = (document.getElementById('aiKey')?.value || '').trim();
            if (keyInput) transientAiKey = keyInput;
            syncKeyToSessionIfNeeded();
        }

        function clearByokKey() {
            transientAiKey = "";
            sessionStorage.removeItem(KEY_STORAGE);
            const keyEl = document.getElementById('aiKey');
            if (keyEl) keyEl.value = "";
            const rememberEl = document.getElementById('rememberKey');
            if (rememberEl) rememberEl.checked = false;
        }

        function toggleShowKey() {
            const keyEl = document.getElementById('aiKey');
            if (!keyEl) return;
            keyEl.type = keyEl.type === 'password' ? 'text' : 'password';
        }

        const PROVIDER_PRESETS = {
            openai: {
                endpoint: 'https://api.openai.com/v1/chat/completions',
                models: ['gpt-4o-mini', 'gpt-4.1-mini', 'gpt-4o']
            },
            gemini: {
                endpoint: 'https://generativelanguage.googleapis.com/v1beta/openai/chat/completions',
                models: ['gemini-1.5-flash', 'gemini-1.5-pro']
            },
            other: { endpoint: '', models: [] }
        };

        function onProviderChange() {
            const provider = document.getElementById('aiProvider')?.value || 'openai';
            const preset = PROVIDER_PRESETS[provider] || PROVIDER_PRESETS.openai;
            const endpointInput = document.getElementById('aiEndpoint');
            const modelSelect = document.getElementById('aiModelSelect');
            const modelInput = document.getElementById('aiModel');

            if (endpointInput && preset.endpoint) endpointInput.value = preset.endpoint;

            if (modelSelect) {
                const customLabel = '自訂模型名稱…';
                modelSelect.innerHTML = '';
                (preset.models || []).forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m;
                    opt.textContent = `${m}（${provider === 'gemini' ? 'Gemini' : 'OpenAI/其他'}）`;
                    modelSelect.appendChild(opt);
                });
                const customOpt = document.createElement('option');
                customOpt.value = '_custom';
                customOpt.textContent = customLabel;
                modelSelect.appendChild(customOpt);

                if (preset.models && preset.models.length > 0) {
                    modelSelect.value = preset.models[0];
                    if (modelInput) modelInput.value = preset.models[0];
                } else {
                    modelSelect.value = '_custom';
                    if (modelInput) modelInput.value = '';
                }
            }
        }

        function onModelPresetChange() {
            const modelSelect = document.getElementById('aiModelSelect');
            const modelInput = document.getElementById('aiModel');
            if (!modelSelect || !modelInput) return;

            const val = modelSelect.value;
            if (val === '_custom') {
                modelInput.focus();
                modelInput.select();
                return;
            }
            modelInput.value = val;
        }

        onProviderChange();
        initByokKey();

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'zh-TW'; 

            recognition.onresult = function(event) {
                let interimTranscript = '';
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                    else interimTranscript += event.results[i][0].transcript;
                }
                if (finalTranscript) {
                    const contentBox = document.getElementById('meetingContent');
                    contentBox.value += (contentBox.value ? '\n' : '') + finalTranscript;
                }
                document.getElementById('interimText').innerText = interimTranscript;
            };
            recognition.onerror = function(event) { console.error("語音辨識發生錯誤:", event.error); };
        } else {
            alert("您的瀏覽器不支援語音轉文字功能，請使用 Google Chrome。");
        }

        async function startRecording() {
            try {
                if (!recognition) {
                    alert("您的瀏覽器不支援語音轉文字功能，請使用 Google Chrome。");
                    return;
                }

                if (isTextOnlySelected()) {
                    isTextOnlyRunning = true;
                    stopMicMeter();
                    document.getElementById('audioPlayback').style.display = 'none';
                    document.getElementById('btnDownloadAudio').style.display = 'none';
                    document.getElementById('micSource').textContent = '';
                    try { recognition.start(); } catch (_) {}
                    document.getElementById('btnStartRecord').disabled = true;
                    document.getElementById('btnStopRecord').disabled = false;
                    document.getElementById('recordingStatus').innerText = "🔴 正在聽寫中（不錄音）...";
                    return;
                }

                const speakerMode = !!document.getElementById('speakerMode')?.checked;
                const audioConstraints = speakerMode
                    ? { echoCancellation: { ideal: false }, noiseSuppression: { ideal: false }, autoGainControl: { ideal: false }, channelCount: { ideal: 1 }, sampleRate: { ideal: 48000 } }
                    : { echoCancellation: { ideal: true }, noiseSuppression: { ideal: true }, autoGainControl: { ideal: true }, channelCount: { ideal: 1 }, sampleRate: { ideal: 48000 } };

                const stream = await navigator.mediaDevices.getUserMedia({ audio: audioConstraints });
                activeStream = stream;

                if (!window.MediaRecorder) {
                    alert("此瀏覽器不支援錄音檔產生。建議勾選「純文字聽寫」或改用 Chrome。");
                    return;
                }

                lastAudioBlob = undefined;
                if (lastAudioUrl) URL.revokeObjectURL(lastAudioUrl);
                lastAudioUrl = undefined;
                lastAudioFilename = "";

                lastAudioMimeType = pickBestAudioMimeType();
                const recorderOptions = lastAudioMimeType ? { mimeType: lastAudioMimeType } : undefined;
                mediaRecorder = recorderOptions ? new MediaRecorder(stream, recorderOptions) : new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const mime = lastAudioMimeType || 'audio/webm';
                    const audioBlob = new Blob(audioChunks, { type: mime });
                    if (!audioBlob || audioBlob.size < 16) {
                        alert("錄音檔是空的。建議改用「純文字聽寫」。");
                        audioChunks = [];
                        return;
                    }
                    lastAudioBlob = audioBlob;
                    lastAudioUrl = URL.createObjectURL(audioBlob);
                    
                    const audioPlayback = document.getElementById('audioPlayback');
                    audioPlayback.src = lastAudioUrl;
                    audioPlayback.style.display = 'block';

                    const downloadBtn = document.getElementById('btnDownloadAudio');
                    const dateStr = new Date().toISOString().replace(/[:.]/g, '-');
                    const ext = guessAudioExtension(mime);
                    lastAudioFilename = `會議錄音_${dateStr}.${ext}`;
                    downloadBtn.style.display = 'inline-block';
                    
                    audioChunks = []; 
                };

                audioChunks = [];
                mediaRecorder.start();
                try { recognition.start(); } catch (_) {} 

                const micSource = document.getElementById('micSource');
                const track = stream.getAudioTracks?.()[0];
                const label = track?.label ? `🎛️ 來源：${track.label}` : '';
                if (micSource) micSource.textContent = label;

                startMicMeter(stream);
                
                document.getElementById('btnStartRecord').disabled = true;
                document.getElementById('btnStopRecord').disabled = false;
                document.getElementById('recordingStatus').innerText = "🔴 正在錄音並轉換文字中...";
                document.getElementById('audioPlayback').style.display = 'none';
                document.getElementById('btnDownloadAudio').style.display = 'none';
            } catch (err) {
                alert("無法存取麥克風，請確認瀏覽器權限！\n" + err.message);
            }
        }

        function stopRecording() {
            if (isTextOnlyRunning) {
                isTextOnlyRunning = false;
                stopMicMeter();
                try { recognition.stop(); } catch (_) {}
                document.getElementById('btnStartRecord').disabled = false;
                document.getElementById('btnStopRecord').disabled = true;
                document.getElementById('btnStartRecord').innerText = "🎤 重新聽寫";
                document.getElementById('recordingStatus').innerText = "✅ 聽寫已完成（未產生錄音檔）";
                document.getElementById('interimText').innerText = "";
                return;
            }

            if (mediaRecorder && mediaRecorder.state === "recording") {
                try { mediaRecorder.requestData(); } catch (_) {}
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                activeStream = undefined;
                stopMicMeter();
                try { recognition.stop(); } catch (_) {} 
                
                document.getElementById('btnStartRecord').disabled = false;
                document.getElementById('btnStopRecord').disabled = true;
                document.getElementById('btnStartRecord').innerText = "🎤 重新錄音";
                document.getElementById('recordingStatus').innerText = "✅ 錄音已完成";
                document.getElementById('interimText').innerText = "";
            }
        }

        function startMicMeter(stream) {
            stopMicMeter();
            const fill = document.getElementById('micMeterFill');
            if (!fill) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const src = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 1024;
                src.connect(analyser);
                const data = new Uint8Array(analyser.fftSize);
                const tick = () => {
                    if (!analyser) return;
                    analyser.getByteTimeDomainData(data);
                    let sum = 0;
                    for (let i = 0; i < data.length; i++) {
                        const v = (data[i] - 128) / 128;
                        sum += v * v;
                    }
                    const rms = Math.sqrt(sum / data.length);
                    const pct = Math.max(0, Math.min(100, Math.round(rms * 260)));
                    fill.style.width = pct + '%';
                    meterRaf = requestAnimationFrame(tick);
                };
                tick();
            } catch (e) { console.warn('音量條初始化失敗：', e); }
        }

        function stopMicMeter() {
            if (meterRaf) cancelAnimationFrame(meterRaf);
            meterRaf = undefined;
            analyser = undefined;
            if (audioCtx) { try { audioCtx.close(); } catch (_) {} }
            audioCtx = undefined;
            const fill = document.getElementById('micMeterFill');
            if (fill) fill.style.width = '0%';
            const micSource = document.getElementById('micSource');
            if (micSource) micSource.textContent = '';
        }

        function pickBestAudioMimeType() {
            if (!window.MediaRecorder || !MediaRecorder.isTypeSupported) return '';
            const candidates = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/aac', 'audio/ogg;codecs=opus', 'audio/ogg'];
            return candidates.find(t => MediaRecorder.isTypeSupported(t)) || '';
        }

        function guessAudioExtension(mime) {
            const m = (mime || '').toLowerCase();
            if (m.includes('mp4')) return 'mp4';
            if (m.includes('aac')) return 'aac';
            if (m.includes('ogg')) return 'ogg';
            return 'webm';
        }

        async function downloadOrShareLastAudio() {
            if (!lastAudioBlob || !lastAudioFilename) return alert('目前沒有可下載的錄音檔。');
            const file = new File([lastAudioBlob], lastAudioFilename, { type: lastAudioBlob.type || 'application/octet-stream' });
            if (navigator.canShare && navigator.share && navigator.canShare({ files: [file] })) {
                try { await navigator.share({ files: [file], title: '會議錄音檔' }); return; } catch (e) { console.warn('share cancelled', e); }
            }
            const url = lastAudioUrl || URL.createObjectURL(lastAudioBlob);
            const a = document.createElement('a');
            a.href = url; a.download = lastAudioFilename; a.target = '_blank';
            document.body.appendChild(a); a.click(); a.remove();
        }

        // --- 會議紀錄管理 ---
        let meetingRecords = [];

        window.onload = function() {
            const savedRecords = localStorage.getItem('myMeetingRecords');
            if (savedRecords) {
                meetingRecords = JSON.parse(savedRecords);
                renderAllRecords();
            }
        };

        async function translateText(text) {
            if (!text.trim()) return "";
            try {
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=zh-TW|en`;
                const response = await fetch(url);
                const data = await response.json();
                if (data.responseData && data.responseData.translatedText) return data.responseData.translatedText;
                return "[翻譯服務暫時無回應]";
            } catch (error) { return "[翻譯發生錯誤，請檢查網路連線]"; }
        }

        async function saveRecord() {
            const date = document.getElementById('meetingDate').value;
            const participants = document.getElementById('participants').value;
            const actionItems = document.getElementById('actionItems').value;
            const content = document.getElementById('meetingContent').value;

            if (!date || !participants || !actionItems || !content) { alert('請填寫所有欄位！'); return; }

            const button = document.querySelector('.btn-primary');
            button.innerText = "⏳ 翻譯並儲存中...";
            button.disabled = true;

            const translatedActionItems = await translateText(actionItems);
            const translatedContent = await translateText(content);

            const record = {
                id: Date.now(),
                date: new Date(date).toLocaleString('zh-TW'),
                rawDate: date.replace(/[:T-]/g, ''),
                participants: participants,
                actionItems: actionItems,
                translatedActionItems: translatedActionItems,
                content: content,
                translatedContent: translatedContent
            };

            meetingRecords.unshift(record);
            localStorage.setItem('myMeetingRecords', JSON.stringify(meetingRecords));
            
            renderAllRecords();
            document.getElementById('meetingForm').reset();
            setMeetingDateNow();
            
            document.getElementById('audioPlayback').style.display = 'none';
            document.getElementById('btnDownloadAudio').style.display = 'none';
            document.getElementById('btnStartRecord').disabled = false;
            document.getElementById('btnStopRecord').disabled = true;
            updateRecordModeUI();
            document.getElementById('recordingStatus').innerText = "";
            
            button.innerText = "💾 儲存並翻譯會議紀錄";
            button.disabled = false;
        }

        function renderAllRecords() {
            const container = document.getElementById('recordsContainer');
            container.innerHTML = '';
            
            meetingRecords.forEach(record => {
                const card = document.createElement('div');
                card.className = 'record-card';
                card.id = `record-${record.id}`;
                
                let printContent = `<div class="printable-area">
                    <h3>🕒 ${record.date}</h3>
                    <p><strong>👥 參與人員：</strong> ${record.participants}</p>
                    <hr style="border:0; border-top:1px solid #ccc; margin:10px 0;">
                    <p><strong>🎯 行動方案：</strong><br>${record.actionItems.replace(/\n/g, '<br>')}</p>
                `;

                if (record.translatedActionItems) printContent += `<div class="translation-box"><strong>🌐 Action Items (English):</strong><br>${record.translatedActionItems}</div>`;
                printContent += `<p style="margin-top:15px;"><strong>📝 會議內容：</strong><br>${record.content.replace(/\n/g, '<br>')}</p>`;
                if (record.translatedContent) printContent += `<div class="translation-box"><strong>🌐 Meeting Content (English):</strong><br>${record.translatedContent}</div>`;
                printContent += `</div>`;

                // 修正重點一：不使用 JSON.stringify 放進 HTML，而是傳遞 ID
                let actionsContent = `
                    <div class="export-actions">
                        <button class="btn-action" onclick="exportTXT(${record.id})">📄 下載 TXT</button>
                        <button class="btn-action" onclick="exportFolder(${record.id})">📁 匯出到資料夾</button>
                        <button class="btn-action danger" onclick="exportPDF(this, '${record.rawDate}')">📊 下載 PDF</button>
                        <button class="btn-action delete" onclick="deleteRecord(${record.id})">🗑️ 刪除</button>
                    </div>
                `;
                card.innerHTML = printContent + actionsContent;
                container.appendChild(card);
            });
        }

        function deleteRecord(id) {
            if(confirm('確定要刪除這筆紀錄嗎？')) {
                meetingRecords = meetingRecords.filter(record => record.id !== id);
                localStorage.setItem('myMeetingRecords', JSON.stringify(meetingRecords));
                renderAllRecords();
            }
        }

        function clearAllRecords() {
            if(confirm('警告：確定要清空所有紀錄嗎？這將無法復原。')) {
                meetingRecords = [];
                localStorage.removeItem('myMeetingRecords');
                renderAllRecords();
            }
        }

        // 配合修正：從 meetingRecords 裡抓資料
        function exportTXT(id) { 
            const record = meetingRecords.find(r => r.id === id);
            if (!record) return;

            let txtContent = `會議紀錄\n時間：${record.date}\n參與人員：${record.participants}\n--------------------\n【行動方案】\n${record.actionItems}\n`;
            if (record.translatedActionItems) txtContent += `(English Translation): ${record.translatedActionItems}\n`;
            txtContent += `--------------------\n【會議內容】\n${record.content}\n`;
            if (record.translatedContent) txtContent += `(English Translation): ${record.translatedContent}\n`;
            
            const blob = new Blob(["\uFEFF" + txtContent], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `會議紀錄_${record.rawDate}.txt`;
            a.target = '_blank';
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        }

        // 修正重點二：簡化 html2pdf 擷取方式，避免超出螢幕導致全白
        // 修正重點：加入 scrollY: 0 解決滾動後空白的問題，並強制設定白底
        function exportPDF(btn, dateStr) {
            const card = btn.closest('.record-card');
            const elementToPrint = card.querySelector('.printable-area');
            
            const oldText = btn.innerText;
            btn.disabled = true;
            btn.innerText = '⏳ 產生 PDF...';

            // 暫時加上白底與內距，確保 PDF 渲染出來不會透明或排版擠在一起
            const originalBg = elementToPrint.style.backgroundColor;
            const originalPadding = elementToPrint.style.padding;
            elementToPrint.style.backgroundColor = '#eaf2f8';
            elementToPrint.style.padding = '15px';

            const opt = {
                margin: 10,
                filename: `會議紀錄_${dateStr}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { 
                    scale: 2, 
                    useCORS: true,
                    scrollY: 0, // 👈 解決向下滾動後截圖變空白的關鍵
                    windowWidth: document.documentElement.offsetWidth,
                    backgroundColor: '#eaf2f8'
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(elementToPrint).save().then(() => {
                // 下載完成後，把樣式復原
                elementToPrint.style.backgroundColor = originalBg;
                elementToPrint.style.padding = originalPadding;
                btn.disabled = false;
                btn.innerText = oldText;
            }).catch(e => {
                console.error('PDF 產生失敗：', e);
                alert('PDF 產生失敗，請檢查瀏覽器主控台 (F12)。');
                btn.disabled = false;
                btn.innerText = oldText;
            });
        }

        function fillParticipantsFromChat() {
            const raw = (document.getElementById('chatLog').value || '').trim();
            if (!raw) return alert('請先貼上對話紀錄到「對話紀錄」欄位。');

            const names = new Set();
            const lines = raw.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
            for (const line of lines) {
                const m = line.match(/^(.{1,30}?)[：:]\s*/);
                if (m && m[1]) {
                    const candidate = m[1].replace(/^\[|\]$/g, '').trim();
                    if (candidate && !/^(系統|System|通知|公告)$/i.test(candidate)) names.add(candidate);
                }
                const atMentions = line.match(/@([^\s，,、:：]{1,30})/g) || [];
                for (const token of atMentions) {
                    const n = token.slice(1).trim();
                    if (n) names.add(n);
                }
            }
            if (!names.size) return alert('沒有在對話紀錄中抓到姓名（需符合「姓名：內容」或「@姓名」）。');
            document.getElementById('participants').value = Array.from(names).join(', ');
        }

        function normalizeBullets(items) {
            const cleaned = items.map(s => (s || '').trim()).filter(Boolean).map(s => s.replace(/^[\-\*\u2022]\s*/, '').trim()).filter(Boolean);
            const uniq = [];
            const seen = new Set();
            for (const s of cleaned) {
                const key = s.replace(/\s+/g, ' ').toLowerCase();
                if (!seen.has(key)) { seen.add(key); uniq.push(s); }
            }
            return uniq.map(s => `- ${s}`).join('\n');
        }

        function generateActionItemsFromContent() {
            const content = (document.getElementById('meetingContent').value || '').trim();
            if (!content) return alert('目前沒有會議內容（逐字稿）。請先錄音轉文字或貼上內容。');
            
            const keywords = ['決議','結論','待辦','行動','action','todo','負責','owner','期限','截止','完成','下週','明天','今天','請','需要','安排','追蹤','follow up'];
            const lines = content.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
            const hits = [];
            for (const l of lines) {
                const lower = l.toLowerCase();
                if (keywords.some(k => lower.includes(String(k).toLowerCase()))) hits.push(l);
            }
            const candidates = hits.length ? hits : lines.slice(-6);
            document.getElementById('actionItems').value = normalizeBullets(candidates);
        }

        async function generateActionItemsWithAI() {
            const content = (document.getElementById('meetingContent').value || '').trim();
            if (!content) return alert('目前沒有會議內容（逐字稿）。請先錄音轉文字或貼上內容。');

            const endpoint = (document.getElementById('aiEndpoint').value || '').trim();
            const model = (document.getElementById('aiModel').value || '').trim();
            const keyInput = (document.getElementById('aiKey').value || '').trim();
            if (keyInput) transientAiKey = keyInput;
            syncKeyToSessionIfNeeded();

            if (!endpoint || !model || !transientAiKey) return alert('請先在「AI API 設定」填入 Endpoint / Model / API Key。');

            const aiBtn = Array.from(document.querySelectorAll('button')).find(b => (b.innerText || '').includes('用 AI'));
            if (aiBtn) { aiBtn.disabled = true; aiBtn.innerText = "⏳ AI 整理中..."; }

            try {
                const prompt = ["請從以下會議逐字稿整理出「行動方案」，用繁體中文輸出。","格式要求：每條一行、以「- 」開頭；每條盡量包含：事項、負責人（若有）、期限（若有）。","不要加標題、不要加其他說明文字，只輸出清單。","","逐字稿：",content].join('\n');
                const resp = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${transientAiKey}` },
                    body: JSON.stringify({ model, messages: [{ role: 'system', content: '你是會議紀錄助理，擅長從逐字稿抽取可執行的待辦事項。' }, { role: 'user', content: prompt }], temperature: 0.2 })
                });

                if (!resp.ok) throw new Error(`API 回應失敗 (${resp.status})：${await resp.text()}`);
                const data = await resp.json();
                const text = data?.choices?.[0]?.message?.content ?? '';
                if (!text.trim()) throw new Error('AI 沒有回傳內容。');
                document.getElementById('actionItems').value = text.trim();
            } catch (e) {
                console.error(e);
                alert("AI 整理失敗。\n" + (e?.message || e));
            } finally {
                if (aiBtn) { aiBtn.disabled = false; aiBtn.innerText = "🤖 用 AI 從逐字稿整理行動方案"; }
            }
        }

        // 配合修正：從 meetingRecords 裡抓資料
        async function exportFolder(id) {
            const record = meetingRecords.find(r => r.id === id);
            if (!record) return;

            const folderName = `會議紀錄_${record.rawDate}`;
            const files = [
                { name: '01_original_transcript_zh.txt', content: record.content || '' },
                { name: '02_translation_en.txt', content: record.translatedContent || '' },
                { name: '03_action_items_zh.txt', content: record.actionItems || '' },
                { name: '04_action_items_en.txt', content: record.translatedActionItems || '' },
                { name: 'meta.json', content: JSON.stringify({ id: record.id, date: record.date, participants: record.participants }, null, 2) }
            ];

            if (window.showDirectoryPicker) {
                try {
                    const dirHandle = await window.showDirectoryPicker();
                    const meetingDir = await dirHandle.getDirectoryHandle(folderName, { create: true });
                    for (const f of files) {
                        const fileHandle = await meetingDir.getFileHandle(f.name, { create: true });
                        const writable = await fileHandle.createWritable();
                        await writable.write(new Blob([f.content], { type: 'text/plain;charset=utf-8' }));
                        await writable.close();
                    }
                    alert(`已匯出到資料夾：${folderName}`);
                    return;
                } catch (e) { console.warn('資料夾匯出失敗，改用下載：', e); }
            }

            for (const f of files) {
                const blob = new Blob([f.content], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `${folderName}_${f.name}`;
                a.click(); URL.revokeObjectURL(url);
            }
        }
    </script>
